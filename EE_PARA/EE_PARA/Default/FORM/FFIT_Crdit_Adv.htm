<body>
<form name="form1" method="post" action="">
  <table width="630" border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td><table width="200" border="0" align="center" cellpadding="0" cellspacing="0">
        <tr>
          <td height="30" valign="bottom" class="style4"><div align="center" class="style4">CREDITADVICE </div></td>
        </tr>
        <tr>
          <td height="30"><div align="center" class="style3">贷记通知</div></td>
        </tr>
      </table>
        <table width="630" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td height="20">&nbsp;</td>
          </tr>
        </table><table width="630" border="0" bordercolor="#000000" style="border-collapse:collapse " cellspacing="0" cellpadding="0">
          <tr>
            <td width="33" class="form_gray"><span class="style2">致</span>：</td>
            <td width="388"><input type="text" name="EXPT_NM" id="EXPT_NM" title="Exporter Name" class="sinput_noborder" length="70" size="70" maxlength="70"></td>
            <td width="126" align="right" class="form_gray"><span class="style2">日&nbsp; 期</span> &nbsp; </td>
            <td width="83"><a onMouseOut="hiddenCale(this)" onMouseOver="visibleCale(this)">
            <input type="text" name="TRX_DT" id="TRX_DT" title="Trans Date" class="sinput_noborder" length="10" size="10" maxlength="10">
</a></td>
          </tr>
        </table>
        <table width="630" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td height="20">&nbsp;</td>
          </tr>
          <tr>
            <td height="20">迳 启 者:</td>
          </tr>
        </table><table width="540" border="1" bordercolor="#000000" style="border-collapse:collapse " align="center" cellpadding="0" cellspacing="0">
          <tr>
            <td width="295" height="20"><span class="style2">发票/票据号</span> ：            
            <input type="text" name="DEBT_INSMT_NO" id="DEBT_INSMT_NO2" title="Debt Instrument NO" class="sinput_noborder" length="17" size="17" maxlength="17"></td>
            <td><span class="style2">金 额
                <input type="text" name="DEBT_INSMT_AMT" id="DEBT_INSMT_AMT" title="Debt Instrument AMT" class="sinput_noborder1" length="18" size="18" maxlength="18" value="0">
            </span></td>
          </tr>
          <tr>
            <td height="20"><span class="style2">我行编号</span>:
            <input type="text" name="C_MAIN_REF" id="C_MAIN_REF" title="MAIN REF. NO." class="sinput_noborder1" length="40" size="40" maxlength="40"></td>
            <td class="style2">信用证号
            <input type="text" name="LC_NO" id="LC_NO" title="LC_NO" class="sinput_noborder" length="25" size="25" maxlength="25"></td>
          </tr>
          <tr>
            <td height="20"><span class="style2">基础业务编号</span>:
            <input type="text" name="TRX_NO" id="TRX_NO" title="Trans NO" class="sinput_noborder" length="20" size="20" maxlength="20"></td>
            <td>&nbsp;</td>
          </tr>
        </table>
        <table width="630" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td height="20">&nbsp;</td>
          </tr>
          <tr>
            <td height="25" class="style2">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 上述业务项下之福费廷融资款扣除下列款项后，我行已于即日将余额              
            <input type="text" name="FINC_CCY" id="FINC_CCY" title="FINC_CCY" class="sinput_noborder" length="3" size="3" maxlength="3">
            <input type="text" name="LONG_AMT" id="LONG_AMT" title="LONG_AMT" class="sinput_noborder" length="18" size="18" maxlength="18" value="0"></td>
          </tr>
          <tr>
            <td height="25"><span class="style2">贷记贵公司
                <input type="text" name="SETT_CUST_AC_NO1" id="SETT_CUST_AC_NO1" title="SETT_CUST_AC_NO1" class="sinput_noborder" length="20" size="20" maxlength="20">
帐户，特此通知。</span></td>
          </tr>
          <tr>
            <td height="20">&nbsp;</td>
          </tr>
        </table>
                <table width="630" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td width="15" height="25">&nbsp;</td>
            <td width="306" class="style2"><span class="style2">福费廷利率</span>:
              <input type="text" name="FINC_RT" id="FINC_RT" title="FINC_RT" class="sinput_noborder" length="8" size="8" maxlength="8">
              <span class="style2">%天数</span>:
            
            <input type="text" name="FINC_DAYS" id="FINC_DAYS2" title="FINC_DAYS" class="sinput_noborder" length="10" size="10" maxlength="10"></td>
            <td width="309" class="style2">押汇/贴现金额：
              
            
              <input type="text" name="FINC_CCY2" id="FINC_CCY2" title="FINC_CCY" class="sinput_noborder" length="3" size="3" maxlength="3">
              <input type="text" name="PURCH_BAL" id="PURCH_BAL" title="PURCH_BAL" class="sinput_noborder" length="18" size="18" maxlength="18" value="0">&nbsp;</td>
          </tr>
          <tr>
            <td height="25">&nbsp;</td>
            <td class="style2"><span class="style2">福费廷利息</span>:
            <input type="text" name="FINC_CCY3" id="FINC_CCY3" title="FINC_CCY" class="sinput_noborder" length="3" size="3" maxlength="3">
            <input type="text" name="FINC_INT" id="FINC_INT" title="FINC_INT" class="sinput_noborder" length="18" size="18" maxlength="18" value="0"></td>
            <td class="style2">押汇/贴现次数：
             
<input type="text" name="PURCH_TIMES" id="PURCH_TIMES" title="PURCH_TIMES" class="sinput_noborder" length="10" size="10" maxlength="10"> &nbsp;</td>
          </tr>
          <tr>
            <td height="25" colspan="3"><span class="style2">费用明细</span></td>
            </tr>
          <tr>
            <td colspan="3">             
            <span class="style2">
            <textarea name="RCV_LIST" cols="70" rows="8" class="style2" id="textarea" title="RCV_LIST" length="500"></textarea>
</span></td>
            </tr>
        </table>
                <table width="630" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td width="15" height="25">&nbsp;</td>
                    <td width="306"><span class="style2">汇率1</span>(
                      <input name="textfield" type="text" class="AmountENR" size="1" maxlength="3">
                      <span class="style2">/RMB</span>):
                    <input name="textfield2" type="text" class="sinput_noborder" size="8" maxlength="8"></td>
                    <td width="309"><span class="style2">汇率2</span>(<input name="textfield" type="text" class="AmountENR" size="1" maxlength="3">
                    <span class="style2">/RMB</span>):<input name="textfield" type="text" class="sinput_noborder" size="8" maxlength="8"></td>
                  </tr>
                  <tr>
                    <td height="25">&nbsp;</td>
                    <td height="20"><p><span class="style2">申 报 号</span>：
                    </p>
                    <p>&nbsp;</p></td>
                    <td height="20">&nbsp;</td>
                  </tr>
                  <tr>
                    <td height="25">&nbsp;</td>
                    <td height="20"><span class="style2">柜员号</span>：                    
                    <input type="text" name="CLERK_ID" id="CLERK_ID2" title="Clerk ID" class="sinput_noborder" length="10" size="10" maxlength="10"></td>
                    <td height="20">&nbsp;</td>
                  </tr>
                </table>
                <table width="630" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td height="20">&nbsp;</td>
                  </tr>
                </table></td>
    </tr>
