CBPR_Account_Servicer_Reference_Guideline=Recommendation: When the same booked entry is reported in both the camt.052 or camt.054, the Account Service reference should be the same as reported in camt.053.
CBPR_Additional_Information_TextualRule=Additional Information may only be used when Reason Code contains the code NARR.
CBPR_Agent_Name_Postal_Address_FormalRule=Name and Address must always be present together.
CBPR_Agent_Name_TextualRule=To be provided, unless BICFI, or Member ID are provided as FI identification, and if Postal Address is used.
CBPR_Agent_National_only_TextualRule=Whenever Debtor Agent, Creditor Agent and all agents in between are located within the same country, the clearing code only may be used.
CBPR_Agent_Option_1_TextualRule=BICFI, complemented optionally with a LEI (preferred option)
CBPR_Agent_Option_2_TextualRule=(Clearing Code OR LEI)  AND (Name AND (Unstructured postal address OR [Structured postal address with minimum Town Name and Country]). It is recommended to also add the post code when available.
CBPR_Agent_Option_3_TextualRule=Name AND (Unstructured OR [Structured postal address with minimum Town Name and Country]). It is recommended to also add the post code when available.
CBPR_Agent_Point_To_Point_On_SWIFT_TextualRule=If the transaction is exchanged on the SWIFT network (ie if the sender and receiver of the message are on SWIFT), then BIC is mandatory and other elements are optional, eg LEI
CBPR_Amount_Currency_FormalRule=The codes XAU, XAG, XPD and XPT are not allowed, as these are codes are only used for commodities.
CBPR_Amount_TextualRule=Amount in the currency of the account reported. Note: This amount can be Zero.
CBPR_BIC_TextualRule=Recommended to be provided as the preferred option.
CBPR_BalanceTypeCode_FormalRule=Maximum 1 occurrence of Balance/Type/CodeOrProprietary/Code with value "CLAV" is allowed.
CBPR_Bank_Transaction_Code_TextualRule=Further qualification of the entry level bank transaction code.  Bank Transaction Code must be provided at  entry level and maybe provided at transaction detail level.
CBPR_Bearer_Guideline=Recommended to always be provided when charges are reported.
CBPR_Booking_Date_TextualRule=Mandatory when Status is booked, Bilaterally Determined when status is Pending or Information.
CBPR_Business_Message_Identifier_TextualRule=The Business Message Identifier is the unique identifier of the Business Message instance that is being transported with this header, as defined by the sending application or system.   Must contain the Message Identification element from the Group Header of the underlying message, where available (as is typically the case with pacs, pain, and camt messages, for example). If Message Identification is not available in the underlying message, then this field must contain the unique identifier of the Business Message instance.
CBPR_Business_Service_TextualRule=This field may be used by SWIFT to support differentiated processing on SWIFT-administered services such as FINplus. For a description of reserved values, please refer to the Service Description for your service.   To support differentiated processing based on CBPRPlus, for example, SWIFT reserves a set of values that conform to a specific format.  A user-specific value may be used, but please contact your Service Administrator before doing so to ensure alignment with general practice on your service.
CBPR_Business_Service_Usage_TextualRule=The value "swift.cbprplus.02" must be used.
CBPR_CHK_Creditor_Account_TextualRule=Creditor Account is not required for cheque payments.
CBPR_CHK_TextualRule=Required in case of cheque relay payment.
CBPR_CRED_FormalRule=Charge information is mandatory if CRED is present - if no charges are taken, Zero must be used in "Amount" (any agent in the payment chain).
CBPR_Cancellation_Identification_FormalRule=For the Cancellation Identification, the below restrictions apply:  - The first one and the 16th one cannot be "/" and  - The string of 16 characters cannot contain "//"
CBPR_Cancellation_Reason_FormalRule=If Status/Confirmation =RJCR then CancellationStatus ReasonInformation/Reason is mandatory.
CBPR_Cancellation_Status_Identification_FormalRule=For the Cancellation Status Identification, the below restrictions apply:  - The first one and the 16th one cannot be "/" and  - The string of 16 characters cannot contain "//"
CBPR_Case_Identification_FormalRule=For the Case/Identification, the below restrictions apply to the first 16 characters:  - The first one and the 16th one cannot be "/" and  - The string of 16 characters cannot contain "//"
CBPR_Category_Purpose_Guideline=The preferred option is coded information.
CBPR_Category_Purpose_TextualRule=The preferred option is coded information.
CBPR_Character_Set_Usage_TextualRule=For further description on the usage of the field, pls refer to the CBPR Plus UHB.
CBPR_Charge_Bearer_TextualRule=Should be provided only on Transaction Level.
CBPR_Charges_TextualRule=Charges against the amount reported at Entry level (single , batch or aggregate amount booking). When batch booked Entry has underlying transactions with charges, the charges will be shown against each entry detail amount.
CBPR_Cheque_From_TextualRule=Populated only if info different from Debtor/Ultimate Debtor; assumes Ultimate Debtor takes precedence over Debtor if populated.
CBPR_Cheque_Maturity_Date_TextualRule=If the instrument has a maturity date.
CBPR_Cheque_Number_TextualRule=Required only for Customer Cheques
CBPR_Clearing_System_Id_TextualRule=Required if Clearing System Identification is provided.
CBPR_Clearing_System_Member_Identification_TextualRule=To be provided as second preference, unless BICFI, or Name and Address are provided as FI identification.
CBPR_Co-existence_Postal_Address_TextualRule=Address Line (Unstructured Address) remains available only for cases when the payment is initiated in FIN, or by an MI, during coexistence only. The Structured PostalAddress remains the prefered option.  Therefore:  - If a payment is initiated on FIN, or by an MI, and the postal address is unstructured, the outgoing ISO 20022 message will transport unstructured postal address, up to the Creditor Agent.  - If a payment is initiated in ISO 20022, postal address must be structured.
CBPR_Copy_Duplicate_FormalRule=If Copy Duplicate indicator is used in the Business Application Header, it must be identical to the Copy Duplicate indicator in the business document (if the latter is present).
CBPR_Copy_Duplicate_Indicator_TextualRule=If Applicable, for Copy or Duplicate,  the electronic sequence  and legal sequence must be the same as the original report.
CBPR_Country_Of_Residence_TextualRule=Country of Residence (where the party physically lives) should be used only if different from PostalAdress/Country (country linked to the owner of the account used for contact purposes).
CBPR_Creator_Identification_TextualRule=If AnyBIC is present in addition to any other optional elements, in case of conflicting information it will always take precedence.
CBPR_Creditor_Account_Guideline=It is recommended not to use CreditorAccount, unless mandated within a community or bilaterally agreed.
CBPR_Creditor_Account_TextualRule=For outward, payment, report where available. Recommendation: If IBAN is available populate IBAN tag, else populate Other.
CBPR_Creditor_Agent_Account_Guideline=It is recommended not to use CreditorAgentAccount, unless mandated within a community or bilaterally agreed.
CBPR_Creditor_Agent_TextualRule=In instances where the ReversalIndicator <RvslInd> is TRUE, the Creditor Agent and Debtor Agent must be the same as the Creditor Agent and Debtor Agent of the original entry.
CBPR_Creditor_BIC_Presence_TextualRule=If Any BIC is present, then (Name and Postal Address) is NOT allowed (other elements remain optional) - However, in case of conflicting information, AnyBIC will always take precedence.
CBPR_Creditor_Option_1_TextualRule=Organisation Identification/AnyBIC AND (Account Number OR Organisation Identification/Other)
CBPR_Creditor_Option_2_TextualRule=Name AND (Unstructured OR [Structured Address with minimumTown Name & Country (+ recommended to add Postal code when available)])  AND  (Account Number OR Identification: Private or Organisation)
CBPR_Creditor_Option_3_Jurisdictions_only_TextualRule=For Jurisdictional transactions,  Creditor/Name is mandatory with either Creditor Account OR Creditor Identification (that is within a country or for regions under same legislations - eg EEA)  Countries impacted by the Jurisdictional rule: Belgium, Bulgaria, Czechia, Denmark, Germany, Estonia, Ireland, Greece, Spain, France, Croatia, Italy, Cyprus, Latvia, Lithuania, Luxembourg, Hungary, Malta, Netherlands, Austria, Poland, Portugal, Romania, Slovenia, Slovakia, Finland, Sweden, United Kingdom - Iceland, Liechtenstein, Norway.  Note: The jurisdictional rules apply only when all agents in the payment chain underly the same jurisdiction.
CBPR_Creditor_TextualRule=For outward payment, report where available.  In instances where the ReversalIndicator <RvslInd> is TRUE, the Creditor and Debtor must be the same as the Creditor and Debtor of the original entry.
CBPR_DEBT_FormalRule=If "Charge Bearer/DEBT" is present, then only one occurrence of "Charge Information" is allowed.
CBPR_DEBT_Rule_1_TextualRule=If Instructed amount and Interbank Settlement Amount are expressed in the same currency:  If Charge Bearer/DEBT is used then Charge Information is only mandatory in case of prepaid charges (that is if Interbank Settlement Amount is higher than Instructed Amount) and in that case zero amount is not allowed. Otherwise Charge information is optional (both Agent and currency always need to be provided).  This rule only applies when Interbank Settlement Amount and Instructed Amount are expressed in the same currency.
CBPR_DEBT_Rule_2_TextualRule=If Instructed amount and Interbank Settlement Amount are not expressed in the same currency:  If Charge Bearer/DEBT is used then Charge Information is only mandatory in case of prepaid charges (that is if Interbank Settlement Amount is higher than Instructed Amount WHEN converted in the same currency) and in that case zero amount is not allowed.   Otherwise Charge information is optional (both Agent and currency always need to be provided).
CBPR_Date_Guideline=Recommendation is to use Actual Date.
CBPR_Debtor_Account_Guideline=It is recommended not to use DebtorAgentAccount, unless mandated within a community or bilaterally agreed.
CBPR_Debtor_Account_TextualRule=For inward payment, report where available. Conditional on the country regulatory requirement. Recommendation: If IBAN is available populate in IBAN tag, else populate Other.
CBPR_Debtor_Agent_Account_Guideline=It is recommended not to use DebtorAgentAccount, unless mandated within a community or bilaterally agreed.
CBPR_Debtor_Agent_TextualRule=One of the following must be provided - BIC or Clearing System Member or Name. In instances where the ReversalIndicator <RvslInd> is TRUE, the Creditor Agent and Debtor Agent must be the same as the Creditor Agent and Debtor Agent of the original entry.
CBPR_Debtor_BIC_Presence_TextualRule=If Any BIC is present, then (Name and Postal Address) is NOT allowed (other elements remain optional) - However, in case of conflicting information, AnyBIC will always take precedence.
CBPR_Debtor_Creditor_ES/AD_FormalRule=Transactions exchanged within these country couples are considered as domestic ones. IF Creditor Agent and Debtor Agent BICs are part of following countries: ES, AD  Then:  Debtor and Creditor must be identified using a Name and the Account/IBAN.
CBPR_Debtor_Creditor_FR/MC_FormalRule=Transactions exchanged within these country couples are considered as domestic ones. IF Creditor Agent and Debtor Agent BICs are part of following countries: FR, MC  Then:  Debtor and Creditor must be identified using a Name and the Account/IBAN.
CBPR_Debtor_Creditor_IBAN_FormalRule=IF Creditor Agent and Debtor Agent BICs are part of following countries:  AT, BE, BG, BV, CY, CZ, DE, DK, EE, ES, FI, FR, GB, GF, GI, GP, GR, HR, HU, IE, IS, IT, LI, LT, LU, LV, MQ (FR), MT, NL, NO, PL, PM (FR), PT, RE (FR), RO, SE, SI, SJ, SK  Then:  Debtor and Creditor must be identified using a Name and the Account/IBAN.
CBPR_Debtor_Creditor_IT/SM_FormalRule=Transactions exchanged within these country couples are considered as domestic ones. IF Creditor Agent and Debtor Agent BICs are part of following countries: IT, SM  Then:  Debtor and Creditor must be identified using a Name and the Account/IBAN.
CBPR_Debtor_Creditor_IT/VA_FormalRule=Transactions exchanged within these country couples are considered as domestic ones. IF Creditor Agent and Debtor Agent BICs are part of following countries: IT, VA  Then:  Debtor and Creditor must be identified using a Name and the Account/IBAN.
CBPR_Debtor_Option_1_TextualRule=Organisation Identification/AnyBIC AND (Account Number OR Organisation Identification/Other)
CBPR_Debtor_Option_2_TextualRule=Name AND (Unstructured OR [Structured Address with minimumTown Name & Country (+ recommended to add Postal code when available)])  AND  (Account Number OR Identification: Private or Organisation)
CBPR_Debtor_Option_3_Jurisdictions_only_TextualRule=For Jurisdictional transactions,  Debtor/ Name is mandatory with either Debtor Account OR Debtor Identification (that is within a country or for regions under same legislations - eg EEA)  Countries impacted by the Jurisdictional rule: Belgium, Bulgaria, Czechia, Denmark, Germany, Estonia, Ireland, Greece, Spain, France, Croatia, Italy, Cyprus, Latvia, Lithuania, Luxembourg, Hungary, Malta, Netherlands, Austria, Poland, Portugal, Romania, Slovenia, Slovakia, Finland, Sweden, United Kingdom - Iceland, Liechtenstein, Norway.  Note: The jurisdictional rules apply only when all agents in the payment chain underly the same jurisdiction.
CBPR_Debtor_TextualRule=For outward payments, report if different from account owner. For inward payments, report where available. In instances where the ReversalIndicator <RvslInd> is TRUE, the Creditor and Debtor must be the same as the Creditor and Debtor of the original entry.
CBPR_Deliver_To_TextualRule=Populated only if info different from Creditor/Ultimate Creditor; assumes Ultimate Creditor takes precedence over Creditor if populated.
CBPR_Delivery_Method_TextualRule=Populated to advise how cheque/draft is to be delivered.
CBPR_Domain_Proprietary_Recommendation_TextualRule=BankTransactionCode/ Domain/ Code is the prefered option and should be used when possible.
CBPR_E2E_ADV_TextualRule=In the pacs.009 ADV, the E2E identification is provided by the Debtor (Agent).
CBPR_E2E_CORE_ADV_TextualRule=If pacs.009CORE is used to cover pacs.009ADV, the E2E identification should transport the instruction identification of the underlying pacs.009 ADV.
CBPR_E2E_CORE_TextualRule=In the pacs.009 CORE, the E2E identification is provided by the Debtor (Agent).
CBPR_E2E_COV_TextualRule=In the pacs.009 COV, the E2E identification should transport the instruction identification of the underlying pacs.008.
CBPR_Electronic_Sequence_Number_TextualRule=Sequential number of the report, assigned by the account servicer. It is increased incrementally by 1 for each report sent electronically.   Note: It is recommended that it is not reset less than a period of a year. Some banks may not reset and will continue incrementally. This process is Bilaterally Determined.
CBPR_Electronique_Or_Legal_Sequence_Number_FormalRule=Either "Electronic Sequence Number" or "Legal Sequence Number" must be present and both are allowed.
CBPR_End_To_End_Identification_FormalRule=For the E2E identification, the below restrictions apply to the first 16 characters:  - The first one and the 16th one cannot be "/" and  - The string of 16 characters cannot contain "//"
CBPR_Expected_Value_Date_FormalRule=If Notification/ExpectedValueDate is absent, then item/ExpectedValueDate must be present.
CBPR_Forwarding_Agent_TextualRule=If the receiver of the pain.002 is not the original Debtor, then the Initiating Party must populate the Forwarding Agent BIC.
CBPR_From_To_Assigner_Assignee_BIC_1_FormalRule=BAH "From" BIC must match "Assigner" BIC, except where BAH CopyDuplicate = COPY or = CODU  BAH "To" BIC must match "Assignee" BIC, except where BAH CopyDuplicate = COPY or = CODU
CBPR_From_To_Assigner_Assignee_BIC_2_FormalRule=BAH "From" BIC must match "Assigner" BIC if CopyDuplicate is absent. BAH "To" BIC must match "Assignee" BIC  if CopyDuplicate is absent.
CBPR_From_To_Instructing_Instructed_Agent_BIC_1_FormalRule=BAH "From" BIC must match "Instructing Agent" BIC, except where BAH CopyDuplicate = COPY or = CODU  BAH "To" BIC must match "Instructed Agent" BIC, except where BAH CopyDuplicate = COPY or = CODU
CBPR_From_To_Instructing_Instructed_Agent_BIC_2_FormalRule=BAH "From" BIC must match "Instructing Agent" BIC if CopyDuplicate is absent. BAH "To" BIC must match "Instructed Agent" BIC  if CopyDuplicate is absent.
CBPR_ISO_Code_TextualRule=Unless the country-specifics require a non-ISO code, preference is to provide Code.
CBPR_ISO_Date_Time_TextualRule=Preferred representation is Local time with UTC offset format (YYYY-MM-DDThh:mm:ss.sss+/-hh:mm).  Otherwise use UTC time format (YYYY-MM-DDThh:mm:ss.sssZ).  Decimal fractions of seconds with 3 digits."
CBPR_Initiating_Party_TextualRule=Party initiating the payment to an agent. In the payment context, this can either be the debtor (in a credit transfer), the creditor (in a direct debit), or a party that initiates the payment on behalf of the debtor or creditor. In the context of treasury, the party that instructs the trading party to execute a treasury deal on its behalf.
CBPR_Instruction_For_Creditor_Presence_Code_FormalRule=Each code can only be used once for element "Instruction For Creditor Agent".
CBPR_Instruction_For_Debtor_Agent_TextualRule=Depending on local payment instrument and bilaterally determined bank service
CBPR_Instruction_Identification_FormalRule=This field must not start or end with a slash '/' and must not contain two consecutive slashes '//'.
CBPR_Instruction_Information_TextualRule=If the pacs.009 is used to settle a pacs.009 Advice, the last available occurrence (of the element Instruction For Creditor Agent/Instruction Information) preceded by /UDLC/ must be used to capture the /UDLC/ (Underlying Creditor) provided in the pacs.009 Advice.
CBPR_Instruction_for_Creditor_Agent1_FormalRule=The code "HOLD" is not allowed if the code "CHQB" is present.
CBPR_Instruction_for_Creditor_Agent1_TextualRule=If  CHQB is present Then  HOLD is not allowed Else  HOLD is optional
CBPR_Instruction_for_Creditor_Agent2_FormalRule=The code "TELB" is not allowed if the code "PHOB" is present.
CBPR_Instruction_for_Creditor_Agent2_TextualRule=If  PHOB is present Then  TELB is not allowed Else  TELB is optional
CBPR_Interbank_Settlement_Amount_FormalRule=If TransactionInformation/OriginalInterbankSettlementAmount is present, then OriginalTransactionReference/InterbankSettlementAmount must not be used.
CBPR_Interbank_Settlement_Currency_FormalRule=The codes XAU, XAG, XPD and XPT are not allowed, as these are codes are only used for commodities.
CBPR_Interbank_Settlement_Date_FormalRule=If TransactionInformation/OriginalInterbankSettlementDate is present, then OriginalTransactionReference/InterbankSettlementDate must not be used.
CBPR_Interest_TextualRule=Total Charges And Tax Amount must equal the sum of the individual record amounts.
CBPR_Intraday_Balance_Recommendation_TextualRule=As increased local regulations are requesting that intraday balance positioning be provided by the account servicing institutions and not be calculated by the account owner, every camt.052 message which include Entry <Ntry> items, Intraday Booked (ITBD ) and IntraDay Available (ITAV) balances should be sent.
CBPR_Issuer_TextualRule=Value of 'ISO' reserved for ISO 11649 international creditor's reference (if used it must be bilaterally agreed).
CBPR_Last_Page_Indicator_1_FormalRule=If LastPageIndicator is "True" then there must be one and only one occurrence of Balance/Type/CodeOrProprietary/Code with value "CLBD" and if Balance/Type/SubType/Code is present, value must be different from "INTM".
CBPR_Last_Page_Indicator_2_FormalRule=If LastPageIndicator is "False" then there must be one and only one occurrence of Balance/Type/CodeOrProprietary/Code with value "CLBD" and with Balance/Type/SubType/Code = "INTM".
CBPR_Legal_Sequence_Number_TextualRule=Legal sequential number of the report, assigned by the account servicer. It is recommended to be increased incrementally by 1 for each report sent.
CBPR_Local_Instrument_Guideline=The preferred option is coded information.
CBPR_Local_Instrument_TextualRule=The preferred option is coded information.
CBPR_Market_Practice_TextualRule=This field may be used by SWIFT on SWIFT-administered services. For a description of reserved values, please refer to the Service Description for your service. Contact your Service Administrator for further clarification, if necessary.  A user-specific value may be used, but please contact your Service Administrator before doing so to ensure alignment with general practice on your service.
CBPR_Message_Definition_Identifier_TextualRule=The Message Definition Identifier of the Business Message instance that is being transported with this header. In general, it must be formatted exactly as it appears in the namespace of the Business Message instance.
CBPR_Message_Identification_TextualRule=If no unique MessageIdentification can be generated, it should be populated with a copy of InstructionIdentification.
CBPR_Message_Pagination_TextualRule=When message pagination is used, the message must contain only one report / statement / notification. Please, see separate XML-sample for rule validation. There is no recommended solution proposed for handling an Entry that is bigger than a file size constraints between customer, bank and the channel being used. In this case it is recommended that it be handled on communications level (e.g. multiple compressed files).
CBPR_Name_Any_BIC_FormalRule=If AnyBIC is Absent Then Name is mandatory.
CBPR_Name_Postal_Address_FormalRule=If Postal Address is present then Name is mandatory.
CBPR_Notification_Item_TextualRule=Single Notification item should be sent unless bilaterally agreed.
CBPR_Original_Clearing_System_Reference_TextualRule=If present in underlying pacs.008/pacs.009, the Clearing System Reference must be transported in the pacs.004.
CBPR_Original_End_To_End_Identification_TextualRule=Must transport the EndToEnd  Identification of the underlying pain.001.
CBPR_Original_Instruction_Identification_FormalRule=This field must not start or end with a slash '/' and must not contain two consecutive slashes '//'.
CBPR_Original_Instruction_Identification_TextualRule=If present in underlying pacs.008/pacs.009, the Instruction Identification must be transported in pacs.004.
CBPR_Original_Message_Identification_1_TextualRule=Original Message Identification should transport the Message Identification of the underlying payment (eg. pacs.008/pacs.009)
CBPR_Original_Message_Identification_2_TextualRule=This element should be only populated by the "Originator" otherwise can be populated with "Not provided".
CBPR_Original_Message_Identification_TextualRule=Original Message Identification must transport the Message Identification of the underlying payment (eg. pain.001).
CBPR_Original_Message_Name_Identification_1_TextualRule=Original Message Name Identification should transport the Message Name Identification of the underlying payment (eg. pacs.008/pacs.009)
CBPR_Original_Message_Name_Identification_FormalRule=This element should be populated with either pacs.002.001.xx or pacs.008.001.xx or pacs.009.001.xx or camt.053.001.xx or camt.054.001.xx or MT103 or MT202 or MT205 or MT 900 or MT910 or MT940 or MT950 when present.
CBPR_Original_Message_Name_Identification_TextualRule=Original Message Name Identification should transport the Message Name Identification of the underlying payment (eg. pacs.008/pacs.009)
CBPR_Original_Transaction_Identification_TextualRule=If present in underlying pacs.008/pacs.009, the Transaction Identification must be transported in the pacs.004.
CBPR_Original_UETR_TextualRule=Must transport the UETR  of the underlying pacs.008/pacs.009
CBPR_Originator_Identification_TextualRule=If AnyBIC is present, in addition to any other optional elements, in case of conflicting information it will always take precedence.
CBPR_Originator_Option_1_FormalRule=If any BIC is absent, then Name is mandatory.
CBPR_Originator_Option_2_FormalRule=If Postal Address is present, then Name is mandatory.
CBPR_Originator_Presence_TextualRule=CancellationReasonInformation/Originator will be populated only if different from Case Creator.
CBPR_Page_Number_1_FormalRule=If PageNumber = 1 then there must be one and only one occurrence of Balance/Type/CodeOrProprietary/Code with value "OPBD" and if Balance/Type/SubType/Code is present, value must be different from "INTM".
CBPR_Page_Number_2_FormalRule=If PageNumber > 1 then there must be one and only one occurrence of Balance/Type/CodeOrProprietary/Code with value "OPBD" and with Balance/Type/SubType/Code = "INTM".
CBPR_Partial_Return_TextualRule=In case of Partial Return, the "ReturnReasonInformation/Additional information" must take the fixed value "PART" and the "ReturnReasonInformation /Reason" must be populated with a code from the External reason code list.
CBPR_Party_Name_Any_BIC_FormalRule=If AnyBIC is absent then Name is mandatory and it is recommended to also provide the Postal Address.
CBPR_Party_Name_Postal_Address_FormalRule=If Postal Address is present then Name is mandatory.
CBPR_Party_Name_TextualRule=If Postal Address is provided, then Name is mandatory. Name without address is allowed.
CBPR_Party_Postal_Addres=If present, it is required to provide structured address data with mandatory Town Name and Country. Upon interbank ISO adoption, unstructured AddressLine will not be supported in the interbank message for this party.
CBPR_Party_Postal_Address=If present, it is required to provide structured address data with mandatory Town Name and Country. Upon interbank ISO adoption, unstructured AddressLine will not be supported in the interbank message for this party.
CBPR_Party_Postal_Address_TextualRule=If present, it is required to provide structured address data with mandatory Town Name and Country. Upon interbank ISO adoption, unstructured AddressLine will not be supported in the interbank message for this party.
CBPR_Payment_Type_Information_TextualRul=Required on Transaction Level, unless bilaterally determined (bank value added service).
CBPR_Payment_Type_Information_TextualRule=Required on Transaction Level, unless bilaterally determined (bank value added service).
CBPR_Priority_Instruction_Priority_FormalRule=If "Priority" is used in the BAH for pacs messages, the value should be identical to the one in the "Payment Type Information/InstructionPriority" if present.
CBPR_Purpose_Guideline=The preferred option is coded information.
CBPR_Reason_Code_NARR_Additional_Information_FormalRule=If Reason code = NARR, then Additional Information is mandatory.
CBPR_Reference_TextualRule=If Creditor Reference Information is used (bilateral agreement), Reference must be included.
CBPR_RelatedBAHBusinessService_TextualRule=If related BAH is present, it should transport the element Business Service.
CBPR_Related_BAH_Business_Service_TextualRule=If related BAH is present, it should transport the element Business Service.
CBPR_Related_Business_Application_Header_TextualRule=If used, the Related BAH must transport the exact same information as in the BAH of the related message.
CBPR_Related_Remit_Info_Remit_Info_Mutually_Exclusive_FormalRule=In the interbank space, Related Remittance Information and Remittance Information are mutually exclusive and all may be absent.
CBPR_RemittanceInformation_TextualRule=1. Use of Structured Remittance must be bilaterally or multilaterally agreed 2. Structured Remittance can be repeated, however the total business data for all occurrences (excluding tags) must not exceed 9,000 characters.
CBPR_Remittance_Mutually_Exclusive_FormalRule=Either Structured or Unstructured Remittance can be present, not both together. Both may be absent.
CBPR_Remittance_Rules_TextualRule=1. Use of Structured Remittance must be bilaterally or multilaterally agreed  2. Structured Remittance can be repeated, however the total business data for all occurrences (excluding tags) must not exceed 9,000 characters.
CBPR_Return_Chain_TextualRule=It is highly recommended for the returning party to populate the Original Information, if pacs.004 follows the original payment route.
CBPR_Returned_Instructed_Rule_1_TextualRule=If ReturnedInstructedAmount and ReturnedInterbankSettlementAmount are expressed in the same currency:  If ReturnedInstructedAmount differs from the ReturnedInterbankSettlementAmount, Charge Information becomes mandatory.  This rule only applies when ReturnedInstructedAmount and ReturnedInterbankSettlementAmount are expressed in the same currency.
CBPR_Returned_Instructed_Rule_2_TextualRule=If ReturnedInstructedAmount and ReturnedInterbankSettlementAmount are NOT expressed in the same currency:  If ReturnedInstructedAmount is higher than ReturnedInterbankSettlementAmount  WHEN converted in the same currency, Charge Information becomes mandatory.
CBPR_Returned_Interbank_Settlement_Currency_FormalRule=The codes XAU, XAG, XPD and XPT are not allowed, as these are codes are only used for commodities.
CBPR_Returned_Payment_TextualRule=If Reason code = Alreday Returned (ARDT), the field "Additional Information" should include the reference of the returned payment.
CBPR_Reversal_Indicator_TextualRule=Value is TRUE or FALSE. Should only be shown if TRUE.
CBPR_SHAR_TextualRule=If deduct taken then charge information is mandatory. It is optional for initiator (not taking deduct).
CBPR_Structured_Remittance_Information_TextualRule=Use of Structured Remittance Information must be bilaterally agreed.  Structured Remittance can be repeated, however the total business data for all occurrences must not exceed 9,000 characters which excludes the tag names, and is irrespective of bytes per character.
CBPR_Structured_vs_Unstructured_FormalRule=If PostalAddress is used and if AddressLine is present, then all other optional elements in PostalAddress must be absent.
CBPR_Total_Amount_Currency_FormalRule=The codes XAU, XAG, XPD and XPT are not allowed, as these are codes are only used for commodities.
TownNameAndCountryRule=If "PostalAddress" is used, and if AddressLine is absent, then Country and Town name must be present.
CBPR_Town_Name_And_Country_FormalRule==If "PostalAddress" is used, and if AddressLine is absent, then Country and Town name must be present.
CBPR_GracePeriod_Structured_FormalRule=If Postal Address is used, and if Address Line is absent, then Town Name and Country must be present.
CBPR_GracePeriod_Hybrid_FormalRule=If Address Line is present and any other Postal Address element(s) are present, then Town Name and Country are mandatory in Postal Address and a maximum of two occurrences of Address Line are allowed.
CBPR_GracePeriod_Unstructured_FormalRule=If Postal Address is present and if no other element than Address Line is present then every occurrence of Address Line must not exceed 35 characters.
CBPR_Town_Name_And_Country_TextualRule=If provided, Structured Address including at least Town Name and Country must be provided.
CBPR_Transaction_Status_Reject_Effective_Sett_Date_FormalRule=If TransactionStatus is "RJCT" then Effective Interbank Settlement Date is not allowed.
CBPR_Transaction_Status_Reject_Reason_FormalRule=If TransactionStatus/Code equals RJCT, then "Status Reason Information/Reason" is mandatory.
CBPR_Transaction_Summary_Guideline=If used, Total Credit and/or Total Debit should, at a minimum, be provided if summary data is available. Recommendation: when pagination is used "Transactions Summary" needs only to be noted in first page.
CBPR_UETR_COV_TextualRule=In the pacs.009 COV, the UETR should transport the UETR of the underlying pacs.008.
CBPR_UETR_TextualRule=If the pacs.009 is used to settle a pacs.009 Advice, the UETR should transport the UETR of the underlying pacs.009 Advice.
CBPR_UltimateCreditor_Option_2_Jurisdictions_only_TextualRule=For Jurisdictional transactions,  Name and/or Identification (Private or Organisation (that is within a country or for regions under same legislations - eg EEA)  Countries impacted by the Jurisdictional rule: Belgium, Bulgaria, Czechia, Denmark, Germany, Estonia, Ireland, Greece, Spain, France, Croatia, Italy, Cyprus, Latvia, Lithuania, Luxembourg, Hungary, Malta, Netherlands, Austria, Poland, Portugal, Romania, Slovenia, Slovakia, Finland, Sweden, United Kingdom - Iceland, Liechtenstein, Norway.  Note: The jurisdictional rules apply only when all agents in the payment chain underly the same jurisdiction.
CBPR_UltimateDebtor_Option_3_Jurisdictions_only_TextualRule=For Jurisdictional transactions,  Name and/or Identification (Private or Organisation) (that is within a country or for regions under same legislations - eg EEA)  Countries impacted by the Jurisdictional rule: Belgium, Bulgaria, Czechia, Denmark, Germany, Estonia, Ireland, Greece, Spain, France, Croatia, Italy, Cyprus, Latvia, Lithuania, Luxembourg, Hungary, Malta, Netherlands, Austria, Poland, Portugal, Romania, Slovenia, Slovakia, Finland, Sweden, United Kingdom - Iceland, Liechtenstein, Norway.  Note: The jurisdictional rules apply only when all agents in the payment chain underly the same jurisdiction.
CBPR_Ultimate_Creditor_Option_1_TextualRule=Name AND Structured Address, with minimum Country (other elements are optional, eg Identification: Private or Organisation)
CBPR_Ultimate_Creditor_Option_2_Jurisdictions_only_TextualRule=For Jurisdictional transactions,  Name and/or Identification (Private or Organisation (that is within a country or for regions under same legislations - eg EEA)  Countries impacted by the Jurisdictional rule: Belgium, Bulgaria, Czechia, Denmark, Germany, Estonia, Ireland, Greece, Spain, France, Croatia, Italy, Cyprus, Latvia, Lithuania, Luxembourg, Hungary, Malta, Netherlands, Austria, Poland, Portugal, Romania, Slovenia, Slovakia, Finland, Sweden - Iceland, Liechtenstein, Norway.  Note: The jurisdictional rules apply only when all agents in the payment chain underly the same jurisdiction.
CBPR_Ultimate_Creditor_Postal_Address_Guideline=If present, it is required to provide structured address data with mandatory Country. Upon interbank ISO adoption, unstructured AddressLine will not be supported in the interbank message for this party.
CBPR_Ultimate_Creditor_TextualRule=In instances where the ReversalIndicator <RvslInd> is TRUE, the Ultimate Creditor and Ultimate Debtor must be the same as the Ultimate Creditor and Ultimate Debtor of the original entry.
CBPR_Ultimate_Debtor_Option_1_TextualRule=Name AND Structured Address with minimum Town Name & Country (+ recommended to add Postal Code when available)
CBPR_Ultimate_Debtor_Option_2_TextualRule=Name AND Structured Address with minimum Town Name & Country (+ recommended to add Postal code when available) AND Identification: Private or Organisation)
CBPR_Ultimate_Debtor_TextualRule=Usage based on business need and bank service. If an ultimate debtor is involved in the payment, being different from the debtor, it must be provided. Required on Transaction Level, unless bilaterally determined.
CBPR_Value_Date_TextualRule=Mandatory when Status is booked, Bilaterally Determined when status is Pending or Information.
CGI_Account_Currency_TextualRule=Recommended.
CGI_ISO_Code_TextualRule=Unless the country-specifics require a non-ISO code, preference is to provide Code.
CGI_ISO_Date_Time_TextualRule=Preferred representation is Local time with UTC offset format (YYYY-MM-DDThh:mm:ss.sss+/-hh:mm).  Otherwise use UTC time format (YYYY-MM-DDThh:mm:ss.sssZ).  Decimal fractions of seconds with 3 digits."
CGI_Initiating_Party_Id_TextualRule=Multiple IDs are allowed to support overpopulation. Can be used for dedicated bank services, e.g. reporting in the pain.002 or online authorisation.
CGI_Instruction_Identification_TextualRule=If provided, this Id is returned to the ordering party in account statement reporting.
CGI_Instruction_Priority_TextualRule=Based on whether priority processing vs. normal processing is offered by the bank.
CGI_Message_Identification_TextualRule=Forwarding Agent should respect the Message ID provided by the Initiating Party of the pain.001 and pain.002.
CGI_Original_Instruction_Id_TextualRule=If provided in the original pain.001, this Id is returned.
CGI_Original_UETR_TextualRule=If provided in the original pain.001, this value is returned.
CGI_Postal_Address_Guideline=RECOMMENDATION IN ORDER OF PREFERENCE:  1. Use only structured address with mandatory Town Name and Country  2. When using unstructured address, (Address Line), max 105 text is allowed.  3. Address Line must not contain Country which must be included in the dedicated Country element in the structured address.  NOTE: As the industry is moving to structured data, Address Line will be removed from the schema in 2025
CGI_Remittance_Location_Details_Postal_Address_TextualRule=Optional, but not recommended to provide this unstructured address data (max. 1 occurance with 70 char) however short-term not all systems may support full structured data. Note that this element will be changed to NU (Not used) in future. If provided, it must not include Country, as this is required as a separate element.  The Debtor or Forwarding Agent has to map the values of AdrLine and Country into 3 occurance (3 x 35 char interbank requirements), until Address Line will cease to be accepted.
CGI_Ultimate_Creditor_TextualRule=Based on business need and bank service. If an ultimate creditor is involved in the payment, being different from the creditor, it must be provided.
CGI_Ultimate_Debtor_TextualRule=Usage based on business need and bank service. If an ultimate debtor is involved in the payment, being different from the debtor, it must be provided. Required on Transaction Level, unless bilaterally determined.
