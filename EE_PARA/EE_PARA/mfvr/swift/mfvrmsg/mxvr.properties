HVPPlus_AgentsRule=Either BIC or (Name and Postal Address) must be present and both can be present.
HVPPlus_PartiesRule=Either AnyBIC or Name and Address must be present and both can be present.
HKRTGS_ClearingMemberID=Invalid HKNCC member ID.
HKRTGS_ClearingMemberID2=Invalid Clearing System Identification or Member Identification.
HKRTGS_ClearingSystemReference=Invalid HKICL System Reference
HKICK_PaymentCode=Invalid payment code.
HKICK_PaymentCode_009=Invalid payment code, must be of the format of 'IFT(01|02|09|10|32|37|50|57|58|69|68|70|71|05|06|31|38|39|11|08|28|36|34|35|64|59|60|61|62)'.
HKICK_PaymentCode_IFT11=For payment code 11, it must be the valid CCASS Deal Code (7x) & Paying Participant ID (8x) separated by '/'.
HKICK_PaymentCode_IFT72=For payment code 72, it must be valid Transaction ID of the collateral transaction in BOJ-NET with format YYMMDDBBBBRRRRLS.
HKICK_Currency=The currency must be HKD, USD, EUR or CNY. The currency must be a supported settlement currency for the payment code.
HKRTGS_CurrencyAmount=The amount must be greater than zero and at a maximum of 999,999,999,999.99.
HVPPlus_NamePostalAddressRule=If Postal Address is present then Name is mandatory.
HVPPlus_NameAnyBICRule=If AnyBIC is Absent Then Name is mandatory.

IAP_From_To_Instructing_Instructed_Agent_BIC_1_FormalRule=BAH "From" BIC must match "Instructing Agent" BIC, except where BAH CopyDuplicate = COPY or = CODU  BAH "To" BIC must match "Instructed Agent" BIC, except where BAH CopyDuplicate = COPY or = CODU
IAP_From_To_Instructing_Instructed_Agent_BIC_2_FormalRule=BAH "From" BIC must match "Instructing Agent" BIC if CopyDuplicate is absent. BAH "To" BIC must match "Instructed Agent" BIC  if CopyDuplicate is absent.
IAP_Priority_Instruction_Priority_FormalRule=If "Priority" is used in the BAH for pacs messages, the value should be identical to the one in the "Payment Type Information/InstructionPriority" if present.
IAP_BusinessMessageIdentifier_and_Messageidentification_FormalRule=The Business Application Header Business Message Identifier element must contain the Message Identification captured within the Business Document.
HVPSPlus_Remittance_MutuallyExclusive_FormalRule=For Remittance info, Unstructured and Structured options are mutually exclusive.
HVPSPlus_MutuallyExclusive_FormalRule=Related Remittance Information and Remittance Information are mutually exclusive.
HVPSPlus_InstructionForCreditor_PresenceCode_FormalRule=Each code can only be used once for element Instruction For Creditor Agent.
HVPSPlus_DEBT_1_TextualRule=If Instructed amount and Interbank Settlement amount are expressed in the same currency: If Charge Bearer/DEBT is used then charge information is only mandatory in case of prepaid charges.
HVPSPlus_DEBT_2_TextualRule=If Charge Bearer DEBT is provided only one optional occurrence of pre-paid charges is allowed.
HVPPlusInstructionForCreditor_PresenceCodeRule=Each code can only be used once for element "Instruction For Creditor Agent".
HKICK_RtrRsnInf_NARR=The second occurrence of RtrRsnInf/AddtlInf must be present when the reason code is NARR. It should start with /REASON/ followed by the description of return reason.
RTGS_PYTR_RMT_Rule=Comment: For individual remittance only (crossborder to China), the customer name in "Debtor" and "Creditor" must be the same.


gCCT_Status_SttlmInf_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, or TransactionStatus/Status is ACCC or RJCT, then Transaction/SettlementInformation is not allowed.
gCCT_Status_InstdAgt_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, or TransactionStatus/Status is ACCC or RJCT, Transaction/Instructed Agent is not allowed.
gCCT_Status_XchgRateData_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, or if TransactionStatus/Status is RJCT, then Transaction/ExchangeRateData is not allowed.
gCCT_Status_ChrgBr_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, or TransactionStatus/Status is ACCC or RJCT, then Transaction/ChargeBearer is not allowed.
gCCT_Status_ChrgsInf_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, or TransactionStatus/Status is RJCT, then Transaction/ChargesInformation is not allowed.
gCCT_StatusReasonG004_PaymentScenarioRCCT_Rule=If the Transaction/PaymentScenario is RCCT, TransactionStatus/StatusReason G004 is not allowed.
gCCT_StatusACCC_TrackerData_Rule=If TransactionStatus/Status is ACCC, TrackerStatusAndTransaction/Transaction/TrackerData must be present.
gCCT_StatusACSPRJCT_TrackerData_Rule=If TransactionStatus/Status is ACSP or RJCT, then TrackerStatusAndTransaction/Transaction/TrackerData is not allowed.
gCCT_StatusReason_ChargeBearer_Rule=If TransactionStatus/Status is ACSP and TransactionStatus/Status Reason is G000 or G001, then Transaction/Charge Bearer is mandatory.
gCCT_PaymentScenarioRCCT_RejectReturnReason_Rule=If TransactionStatus/Status is ACSP, and the Status Reason is G000 or G001, and the Transaction/Payment Scenario is RCCT, then TransactionStatus/Reject Return Reason is mandatory.
gCCT_PaymentScenarioCCTR_RejectReturnReason_Rule=If TransactionStatus/Status is ACSP, and the Status Reason is G000 or G001, and the Transaction/Payment Scenario is CCTR, then TransactionStatus/Reject Return Reason is not allowed.
gCCT_SettlementMethod_InstdAgtClrSysMmbId_Rule=If the Transaction/SettlementInformation/SettlementMethod is INGA, INDA or COVE, and the Transaction/InstructedAgent is present, then the InstructedAgent/FinancialInstititutionIdentification/ClearingSystemMemberIdentification is not allowed. Usage Rule: The BIC must be used instead.
gCCT_InterbankSettlementAmount_Target_Currency_Rule=If Transaction/Interbank Settlement Amount is present and Transaction/ExchangeRateData/TargetCurrency is present, then Transaction/InterbankSettlementAmount currency must be equal to the Transaction/ExchangeRateData/TargetCurrency.
gCCT_Target_Currency_ConfdAmt_Rule=If Transaction/ExchangeRateData/TargetCurrency is present and Transaction/TrackerData/ConfirmedAmount is present, then Transaction/ExchangeRateData/TargetCurrency must be equal to Transaction/TrackerData/Confirmed Amount currency.
gCCT_ChrgBr_CRED_ChrgsInf_Rule=If Transaction/ChargeBearer is present, and if Transaction/ChargeBearer is CRED, then Transaction/ChargesInformation must be present (even if no charge was taken).
gCCT_ChrgBr_DEBT_ChrgsInf_Rule=If Transaction/ChargeBearer is present, and if Transaction/ChargeBearer is DEBT, then Transaction/ChargesInformation is not allowed.
gCCT_SttlmMtd_CLRG_InstdAgtClrSysMmbId_Rule=If Transaction/SettlementInformation is present and Transaction/SettlementInformation/SettlementMethod is CLRG, then Transaction/SettlementInformation/Clearing System may be present.
gCCT_StatusReason_Date_Rule=If TransactionStatus/StatusReason is G002, G003 or G004, then TransactionStatus/Date is not allowed.
gCCT_Status_ACCC_Date_Rule=If TransactionStatus/Status is ACCC, then TransactionStatus/Date is not allowed. Usage: 'Confirmed Date', on Tracker Data level, must be used instead.
gCCT_Status_RJCT_Date_Rule=If TransactionStatus/Status is RJCT, then TransactionStatus/Date must be present. Usage rule: It must reflect 1. effective rejection time, or 2. send date/time of pacs.002 on non SWIFT network, or 3. rejection time from PMI.
gCCT_Status_ACSP_StatusReason_Rule=If TransactionStatus/Status is ACSP, then TransactionStatus/Status Reason must be present.
gCCT_Status_ACCCRJCT_StatusReason_Rule=If TransactionStatus/Status is ACCC or RJCT, then TransactionStatus/Status Reason is not allowed.
gCCT_Status_RJCT_RjctRtrRsn_Rule=If TransactionStatus/Status is RJCT, then Reject Return Reason is mandatory.
gCCT_Status_ACCC_IntrBkSttlmAmt_Rule=If TransactionStatus/Status is ACCC, then Transaction/InterbankSettlementAmount is not allowed.
gCCT_StatusReason_G000_Date_Rule=If TransactionStatus/StatusReason is G000 or G001, TransactionStatus/Date must be present.  Usage Rule: It must equal the send date/time of the leg not on SWIFT.
gCCT_StatusReason_G000_SttlmInf_Rule=If TransactionStatus/StatusReason is G000 or G001, then Transaction/SettlementInformation must be present.
gCCT_PaymentScenarioRCCT_COVE_Rule=If the Transaction/PaymentScenario is RCCT, then Transaction/SettlementInformation/SettlementMethod COVE is not allowed.
gCCT_StatusReason_G000_InstdAgt_Rule=If TransactionStatus/StatusReason is G000, then Transaction/InstructedAgent is mandatory.
gCCT_StatusReason_G000_IntrBkSttlmAmt_Rule=If TransactionStatus/StatusReason is G000 or G001, then Transaction/Interbank Settlement Amount must be present.
gCCT_SttlmMtd_CLRG_ClrSys_Rule=If Transaction/SettlementInformation/ClearingSystem is present, then Transaction/SettlementMethod must equal value CLRG.
gCCT_Status_ACCC_RjctRtrRsn_Rule=If the TrackerStatusAndTransaction>TransactionStatus>Status is ACCC, then TrackerStatusAndTransaction>TransactionStatus>RejectReturnReason is not allowed.
gCCT_Status_ACSP_RjctRtrRsn_Rule=If the TransactionStatus>Status is ACSP and the TransactionStatus>StatusReason is G002, G003 or G004, then the TransactionStatus>RejectReturnReason is not allowed.
gCCT_InstdAgt_Rule=If Transaction/Instructed Agent is present, it must be identified by either a BIC or a Clearing System Member Identification. BIC and Clearing System Member Identification are mutually exclusive.
gCCT_XchgRateData_Currency_Rule=If Transaction/ExchangeRateData is present, then Transaction/ExchangeRateData/SourceCurrency must have a different currency than Transaction/ExchangeRate/TargetCurrency.
gCCT_BICFI_Name_Rule=If Transaction/ChargesInformation is present, then Transaction/ChargesInformation/Agent/FinancialInstitutionIdentification must be either 'BIC' or 'Name'. (presence of both is not allowed)