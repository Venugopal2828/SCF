#==============================================================  
#Configure Main Scheduler Properties  
#==============================================================   
org.quartz.scheduler.instanceName = smmsScheduler1   
org.quartz.scheduler.instanceId = instance_one  
#==============================================================  
#Configure ThreadPool  
#==============================================================   
org.quartz.threadPool.class = org.quartz.simpl.SimpleThreadPool   
org.quartz.threadPool.threadCount = 50   
org.quartz.threadPool.threadPriority = 5  
#==============================================================  
#Configure JobStore  
#==============================================================   
org.quartz.jobStore.misfireThreshold = 60000   
org.quartz.jobStore.class = org.quartz.impl.jdbcjobstore.JobStoreTX
#org.quartz.jobStore.driverDelegateClass =  org.quartz.impl.jdbcjobstore.oracle.OracleDelegate
org.quartz.jobStore.driverDelegateClass =org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.tablePrefix = QRTZ_   
org.quartz.jobStore.dataSource = smmsDS
  
org.quartz.jobStore.isClustered = true  
org.quartz.jobStore.clusterCheckinInterval = 20000  
#==============================================================  
#Non-Managed Configure Datasource  
#==============================================================   
#org.quartz.dataSource.smmsDS.driver = oracle.jdbc.driver.OracleDriver
#org.quartz.dataSource.smmsDS.URL = jdbc:oracle:thin:@rhel4svr:1521:smms   
#org.quartz.dataSource.smmsDS.user = qdog1   
#org.quartz.dataSource.smmsDS.password = qdog1   
org.quartz.dataSource.smmsDS.maxConnections = 10  
org.quartz.dataSource.smmsDS.driver = com.mysql.jdbc.Driver
org.quartz.dataSource.smmsDS.URL = jdbc:mysql://127.0.0.1/test
org.quartz.dataSource.smmsDS.user = qdog
org.quartz.dataSource.smmsDS.password = qdog
